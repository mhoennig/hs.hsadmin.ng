get:
    tags:
        - rbac-subjects
    description: 'Fetch a single subject by its id, if visible for the current subject.'
    operationId: getSingleSubjectByUuid
    parameters:
        - $ref: 'auth.yaml#/components/parameters/assumedRoles'
        - name: subjectUuid
          in: path
          required: true
          schema:
              type: string
              format: uuid
    responses:
        "200":
            description: OK
            content:
                'application/json':
                    schema:
                        $ref: 'rbac-subject-schemas.yaml#/components/schemas/RbacSubject'

        "401":
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        "403":
            $ref: 'error-responses.yaml#/components/responses/Forbidden'
        "404":
            $ref: 'error-responses.yaml#/components/responses/NotFound'


put:
    tags:
        - rbac-subjects
    description: |
        Global-admin-only idempotent create-or-update of a USER or GROUP subject, keyed by the UUID
        in the path (the same UUID as in Keycloak). Creates the subject if the UUID is unknown
        (201 Created) or updates its name and organization if it is already known (200 OK); an
        identical request is a no-op (200 OK). The subject type is immutable. If no explicit
        organization is given, it is derived from the subject-name prefix (the part before the
        first '-', without the leading '/' of GROUP subject names). An explicitly given GROUP
        organization must match the group-name prefix, because JWTs reference groups just by name.
        The optional `deactivated` property synchronizes the activation state, e.g. for a user
        disabled or removed in Keycloak; see its schema description.
        Used by the external Keycloak sync program.
        API_KEY subjects never stem from Keycloak and are rejected with 400 Bad Request;
        create them via `POST /api/rbac/subjects` instead.
    operationId: putSubjectByUuid
    parameters:
        - name: subjectUuid
          in: path
          required: true
          schema:
              type: string
              format: uuid
          description: UUID of the subject to create-or-update; identical to the UUID in Keycloak.
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    $ref: 'rbac-subject-schemas.yaml#/components/schemas/RbacSubjectUpsert'
    responses:
        "200":
            description: OK - the subject already existed and its name was updated (or was unchanged).
            content:
                'application/json':
                    schema:
                        $ref: 'rbac-subject-schemas.yaml#/components/schemas/RbacSubject'
        "201":
            description: Created - a new subject was created for the given UUID.
            content:
                'application/json':
                    schema:
                        $ref: 'rbac-subject-schemas.yaml#/components/schemas/RbacSubject'
        "400":
            $ref: 'error-responses.yaml#/components/responses/BadRequest'
        "401":
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        "403":
            $ref: 'error-responses.yaml#/components/responses/Forbidden'
        "409":
            $ref: 'error-responses.yaml#/components/responses/Conflict'


delete:
    tags:
        - rbac-subjects
    description: |
        Physically deletes a subject together with its rbac.reference and all its grants;
        for an API_KEY subject this also removes the stored API-key hash, which immediately
        and permanently revokes the key. This operation is restricted to global-admins
        (403 otherwise) and is destructive and irreversible: there is no soft-delete via
        DELETE; to deactivate (and later reactivate) a USER or GROUP subject, use the
        declarative HTTP PUT with `deactivated: true` on the same path.
        As a safeguard against deleting the wrong subject, the subject is identified by the
        UUID in the path, but its `name` and `type` must additionally be given as query
        parameters and must match the stored subject (400 Bad Request otherwise).
        The operation is idempotent and answers 204 for an unknown UUID.
    operationId: deleteSubjectByUuid
    parameters:
        - name: subjectUuid
          in: path
          required: true
          schema:
              type: string
              format: uuid
          description: UUID of the subject to delete.
        - name: name
          in: query
          required: true
          schema:
              type: string
          description: Must match the name of the subject identified by the UUID in the path.
        - name: type
          in: query
          required: true
          schema:
              $ref: 'rbac-subject-schemas.yaml#/components/schemas/SubjectType'
          description: Must match the type of the subject identified by the UUID in the path.
    responses:
        "204":
            description: No Content - the operation is idempotent and also answers 204 for an unknown UUID.
        "400":
            $ref: 'error-responses.yaml#/components/responses/BadRequest'
        "401":
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        "403":
            $ref: 'error-responses.yaml#/components/responses/Forbidden'
