
components:

    schemas:

        SubjectType:
            type: string
            enum:
                - USER
                - GROUP

        RbacSubject:
            type: object
            properties:
                uuid:
                    type: string
                    format: uuid
                name:
                    type: string
                type:
                    $ref: '#/components/schemas/SubjectType'
        RbacSubjectPermission:
            type: object
            properties:
                object.uuid:
                    type: string
                    format: uuid
                objectTable:
                    type: string
                objectIdName:
                    type: string
                roleName:
                    type: string
                role.uuid:
                    type: string
                    format: uuid
                permission.uuid:
                    type: string
                    format: uuid
                op:
                    type: string
