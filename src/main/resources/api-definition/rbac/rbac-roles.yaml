get:
    tags:
        - rbac-roles
    operationId: getListOfRoles
    parameters:
        - $ref: 'auth.yaml#/components/parameters/assumedRoles'
        - name: name
          in: query
          required: false
          schema:
              type: string
          description: IdName of the role
    responses:
        "200":
            description: OK
            content:
                'application/json':
                    schema:
                        type: array
                        items:
                            $ref: 'rbac-role-schemas.yaml#/components/schemas/RbacRole'
