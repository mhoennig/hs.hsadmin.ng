get:
    tags:
        - rbac-subjects
    description: List accessible RBAC subjects with optional filters by name, organization and type.
    operationId: getListOfSubjects
    parameters:
        - $ref: 'auth.yaml#/components/parameters/assumedRoles'
        - name: name
          in: query
          required: false
          schema:
              type: string
          description: Filter by subject-name prefix.
        - name: organization
          in: query
          required: false
          schema:
              type: string
          description: Filter by the exact organization (realm) of the subject.
        - name: type
          in: query
          required: false
          schema:
              $ref: 'rbac-subject-schemas.yaml#/components/schemas/SubjectType'
    responses:
        '200':
            description: OK
            content:
                'application/json':
                    schema:
                        type: array
                        items:
                            $ref: 'rbac-subject-schemas.yaml#/components/schemas/RbacSubject'
        '401':
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        '403':
            $ref: 'error-responses.yaml#/components/responses/Forbidden'

post:
    tags:
        - rbac-subjects
    description: Create a new RBAC subject (e.g. user). Restricted to global-admins.
    operationId: postNewSubject
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    $ref: 'rbac-subject-schemas.yaml#/components/schemas/RbacSubjectInsert'
    responses:
        '201':
            description: Created
            content:
                'application/json':
                    schema:
                        $ref: 'rbac-subject-schemas.yaml#/components/schemas/RbacSubject'
        '400':
            $ref: 'error-responses.yaml#/components/responses/BadRequest'
        '401':
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        '403':
            $ref: 'error-responses.yaml#/components/responses/Forbidden'
        '409':
            $ref: 'error-responses.yaml#/components/responses/Conflict'
