get:
    tags:
        - rbac-context
    description: |
        Information about the current subject.
        If the request is authenticated with an API-key, the response additionally contains
        the properties of that API-key (endpoint-scopes and expiry timestamp); this endpoint
        is always allowed for scoped API-keys, to support such self-inspection.
    operationId: getContext
    parameters:
        - $ref: 'auth.yaml#/components/parameters/assumedRoles'
    responses:
        '200':
            description: OK
            content:
                'application/json':
                    schema:
                        $ref: 'rbac-context-schemas.yaml#/components/schemas/RbacContext'
        '401':
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        '403':
            $ref: 'error-responses.yaml#/components/responses/Forbidden'
