
components:

  schemas:

    RbacContext:
      type: object
      properties:
        subject:
          $ref: 'rbac-subject-schemas.yaml#/components/schemas/RbacSubject'
        assumedRoles:
          type: array
          items:
            $ref: 'rbac-role-schemas.yaml#/components/schemas/RbacRole'
        claimedGroups:
          type: array
          description: GROUP names claimed in the JWT, even if not yet synchronized as subjects.
          items:
            type: string
        effectiveGroups:
          type: array
          description: Effective synchronized GROUP subjects after applying assumed roles.
          items:
            $ref: '#/components/schemas/RbacSubjectGroup'
        globalAdmin:
          type: boolean
        apiKey:
          $ref: '#/components/schemas/RbacContextApiKey'

    RbacContextApiKey:
      type: object
      description: |
        Properties of the API-key used to authenticate the current request;
        null if the request was authenticated via an OIDC JWT instead.
      properties:
        scopes:
          type: array
          items:
            type: string
          uniqueItems: true
          description: |
            The named endpoint-scopes of the API-key; empty for an unrestricted API-key.
            See `GET /api/rbac/scopes` for the endpoints each scope allows.
        expiresAt:
          type: string
          format: date-time
          description: The expiry timestamp of the API-key; null for a never-expiring API-key.

    RbacSubjectGroup:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
      required:
        - uuid
        - name
