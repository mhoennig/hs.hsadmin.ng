get:
    summary: Returns a list of accounts.
    description:
        Returns the list of accounts visible to the current subject.
        For a (effective) global-admin, all accounts are returned.
        For other subjects, all accounts belonging to the same person as the login-account are returned.
    tags:
        - account
    operationId: getListOfAccounts
    parameters:
        - $ref: 'auth.yaml#/components/parameters/assumedRoles'
        - name: personUuid
          in: query
          required: false
          schema:
              type: string
              format: uuid
          description: The UUID of the person, whose accounts are to be fetched. Or null, if the accounts of the login-subject (or, for a global-admin, all accounts) should be fetched.
    responses:
        "200":
            description: OK
            content:
                'application/json':
                    schema:
                        type: array
                        items:
                            $ref: 'account-schemas.yaml#/components/schemas/Account'
        "401":
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        "403":
            $ref: 'error-responses.yaml#/components/responses/Forbidden'

post:
    summary: Adds a new  account.
    tags:
        - account
    operationId: postNewAccount
    requestBody:
        description: A JSON object describing the new  credential.
        required: true
        content:
            application/json:
                schema:
                    $ref: 'account-schemas.yaml#/components/schemas/AccountInsert'
    responses:
        "201":
            description: Created
            content:
                'application/json':
                    schema:
                        $ref: 'account-schemas.yaml#/components/schemas/Account'
        "401":
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        "403":
            $ref: 'error-responses.yaml#/components/responses/Forbidden'
        "409":
            $ref: 'error-responses.yaml#/components/responses/Conflict'
