
components:

    schemas:

      Scope:
            type: object
            properties:
                uuid:
                    type: string
                    format: uuid
                type:
                    type: string
                    maxLength: 16
                qualifier:
                    type: string
                    maxLength: 80
                onlyForNaturalPersons:
                    type: boolean
                publicAccess:
                    type: boolean
            required:
                - uuid
