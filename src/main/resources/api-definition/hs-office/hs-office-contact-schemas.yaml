
components:

    schemas:

        HsOfficeContact:
            type: object
            properties:
                uuid:
                    type: string
                    format: uuid
                caption:
                    type: string
                postalAddress:
                    $ref: '#/components/schemas/StringMap'
                emailAddresses:
                    $ref: '#/components/schemas/StringMap'
                phoneNumbers:
                    $ref: '#/components/schemas/StringMap'

        HsOfficeContactInsert:
            type: object
            properties:
                caption:
                    type: string
                postalAddress:
                    $ref: '#/components/schemas/StringMap'
                emailAddresses:
                    $ref: '#/components/schemas/StringMap'
                phoneNumbers:
                    $ref: '#/components/schemas/StringMap'
            required:
                - caption
            additionalProperties: false

        HsOfficeContactPatch:
            type: object
            properties:
                caption:
                    type: string
                    nullable: true
                postalAddress:
                    $ref: '#/components/schemas/StringMap'
                emailAddresses:
                    $ref: '#/components/schemas/StringMap'
                phoneNumbers:
                    $ref: '#/components/schemas/StringMap'
            additionalProperties: false

        StringMap:
            # a key-to-string-value map, e.g. {"main": "info@example.org"};
            # mapped to java.util.Map<String, String> via api-mappings.yaml
            type: object
            additionalProperties:
                type: string
