get:
    summary: Returns a list of (optionally filtered) person relations for a given person.
    description:
        Returns the list of (optionally filtered) person relations of a given person and which are visible to the current subject or any of it's assumed roles.
        To match data, all given query parameters must be fulfilled ('and' / logical conjunction).
    tags:
        - hs-office-relations
    operationId: getListOfRelations
    parameters:
        - $ref: 'auth.yaml#/components/parameters/assumedRoles'
        - name: personUuid
          in: query
          required: false
          schema:
              type: string
              format: uuid
          description: UUID of a person, matching if it is either the anchor or the holder of the relation.
        - name: anchorPersonUuid
          in: query
          required: false
          schema:
              type: string
              format: uuid
          description: UUID of the anchor person.
        - name: holderPersonUuid
          in: query
          required: false
          schema:
              type: string
              format: uuid
          description: UUID of the holder person.
        - name: relationType
          in: query
          required: false
          schema:
              $ref: 'hs-office-relation-schemas.yaml#/components/schemas/HsOfficeRelationType'
          description: Type of the relation.
        - name: mark
          in: query
          required: false
          schema:
            type: string
          description:
            Extra data, depending on the relation type.
            This is also discriminatory regarding the unique constraint,
            thus the same anchor+holder+contant+type can have multiple records with different marks.
        - name: personData
          in: query
          required: false
          schema:
              type: string
          description: 'Data from any of these text field in the anchor or holder person: tradeName, familyName, givenName'
        - name: contactUuid
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: UUID of the contact to filter the results.
        - name: contactData
          in: query
          required: false
          schema:
              type: string
          description: 'Data from any of these text field in the contact: caption, postalAddress, emailAddresses, phoneNumbers'
    responses:
        "200":
            description: OK
            content:
                'application/json':
                    schema:
                        type: array
                        items:
                            $ref: 'hs-office-relation-schemas.yaml#/components/schemas/HsOfficeRelation'
        "401":
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        "403":
            $ref: 'error-responses.yaml#/components/responses/Forbidden'

post:
    summary: Adds a new person relation.
    tags:
        - hs-office-relations
    operationId: postNewRelation
    parameters:
        - $ref: 'auth.yaml#/components/parameters/assumedRoles'
    requestBody:
        content:
            'application/json':
                schema:
                    $ref: 'hs-office-relation-schemas.yaml#/components/schemas/HsOfficeRelationInsert'
        required: true
    responses:
        "201":
            description: Created
            content:
                'application/json':
                    schema:
                        $ref: 'hs-office-relation-schemas.yaml#/components/schemas/HsOfficeRelation'
        "401":
            $ref: 'error-responses.yaml#/components/responses/Unauthorized'
        "403":
            $ref: 'error-responses.yaml#/components/responses/Forbidden'
        "409":
            $ref: 'error-responses.yaml#/components/responses/Conflict'
