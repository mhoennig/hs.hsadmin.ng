jenkins:
  systemMessage: "Jenkins configuration via Jenkins Configuration as Code"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: true
  clouds:
    - docker:
        name: "docker"
        dockerApi:
          dockerHost:
            uri: "${DOCKER_HOST}"
          connectTimeout: 60
          readTimeout: 60
        containerCap: 10
  remotingSecurity:
    enabled: true
  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
        - id: "admin"
          name: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
          properties:
            - "consoleUrlProvider"
            - "favorite"
            - "myView"
            - preferredProvider:
                providerId: "default"
            - theme:
                theme: "noOp"
            - "timezone"
            - "experimentalFlags"
            - mailer:
                emailAddress: "michael.hoennig@hostsharing.net"
            - "apiToken"

credentials:
  system:
    domainCredentials:
      - credentials:
          # Username/password credential
          - usernamePassword:
              scope: GLOBAL
              id: 'hsadmin-NG-git'
              username: "${GIT_USERNAME}"
              password: "${GIT_PASSWORD}"
              description: 'git access'

jobs:
    - script: >
          multibranchPipelineJob('hsadmin-NG Java backend') {
            branchSources {
              git {
                id('hsadmin-NG')
                remote('https://dev.hostsharing.net/hostsharing/hs.hsadmin.ng')
                credentialsId('hsadmin-NG-git')
              }
            }
            factory {
              workflowBranchProjectFactory {
                scriptPath('Jenkins/Jenkinsfile')
              }
            }
            triggers {
              periodicFolderTrigger {
                interval('2m')
              }
            }
          }

security:
  apiToken:
    creationOfLegacyTokenEnabled: false
    tokenGenerationOnCreationEnabled: false
    usageStatisticsEnabled: true
  cps:
    hideSandbox: false
  gitHooks:
    allowedOnAgents: false
    allowedOnController: false
  gitHostKeyVerificationConfiguration:
    sshHostKeyVerificationStrategy: "knownHostsFileVerificationStrategy"
  globalJobDslSecurityConfiguration:
    useScriptSecurity: true
  scriptApproval:
    forceSandbox: true
  location:
    adminAddress: "michael.hoennig@hostsharing.net"
    url: "https://vm2176.hostsharing.net/"
  mailer:
    charset: "UTF-8"
    useSsl: false
    useTls: false
  pollSCM:
    pollingThreadCount: 10
  scmGit:
    addGitTagAction: false
    allowSecondFetch: false
    createAccountBasedOnEmail: false
    disableGitToolChooser: false
    hideCredentials: false
    showEntireCommitSummaryInChanges: false
    useExistingAccountWithSameEmail: false
  timestamper:
    allPipelines: false
    elapsedTimeFormat: "'<b>'HH:mm:ss.S'</b> '"
    systemTimeFormat: "'<b>'HH:mm:ss'</b> '"

tool:
  git:
    installations:
      - home: "git"
        name: "Default"
  mavenGlobalConfig:
    globalSettingsProvider: "standard"
    settingsProvider: "standard"
